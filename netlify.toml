[[build]
  publish = "."

[[redirects]]
  from = "/about-me"
  to = "/about-me/"
  status = 301

[[redirects]]
  from = "/booking"
  to = "/booking/"
  status = 301

[[redirects]]
  from = "/counselling"
  to = "/counselling/"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/contact/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"